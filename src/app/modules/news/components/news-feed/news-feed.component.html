<div class="container max-w-xl mx-auto mt-5">
  <div class="border rounded shadow p-4 bg-white">
    <div *ngIf="loading" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-75 z-50">
      <div class="text-center">
        <div class="inline-block w-8 h-8 border-4 border-pink-500 border-dashed rounded-full animate-spin"></div>
        <p class="text-sm text-gray-500 mt-2">Loading...</p>
      </div>
    </div>

    <h3 class="text-center text-lg font-semibold text-pink-600 mb-4">📝 New Post</h3>


    <!-- Title -->
    <div class="mb-3">
      <input
        [(ngModel)]="newPost.title"
        name="title"
        class="form-control form-control-sm"
        placeholder="Title (min 5 characters)"
      />
    </div>

    <!-- Description -->
    <div class="mb-3">
      <textarea
        [(ngModel)]="newPost.description"
        name="description"
        rows="2"
        class="form-control form-control-sm"
        placeholder="Write something interesting (min 10 characters)"
      ></textarea>
    </div>

    <!-- Media upload -->
    <div class="mb-3">
      <label class="form-label text-sm font-medium">📤 Upload Media</label>

      <input
        type="file"
        multiple
        (change)="onFilesSelected($event)"
        accept="image/*,video/mp4,video/webm"
        class="form-control form-control-sm"
      />

      <p class="text-xs text-gray-400 mt-1">
        Images (max 2MB) • Videos (max 50MB)
      </p>
    </div>

    <!-- Preview -->
    <div class="mt-4 flex flex-wrap gap-4">

      <div *ngFor="let file of previewFiles; let i = index"
           class="relative w-28 h-28">

        <!-- IMAGE -->
        <img *ngIf="file.type === 'image'"
             [src]="file.url"
             class="w-full h-full object-cover rounded-xl shadow border" />

        <!-- VIDEO -->
        <video *ngIf="file.type === 'video'"
               [src]="file.url"
               class="w-full h-full object-cover rounded-xl shadow border"
               controls>
        </video>

        <!-- Remove button -->
        <button
          (click)="removeFile(i)"
          type="button"
          class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-6 h-6 flex items-center justify-center text-xs shadow"
          title="Remove">
          ✕
        </button>

      </div>

    </div>
    <!-- Button -->
    <div class="text-end">
      <button class="btn btn-sm btn-pink bg-pink-600 text-white" (click)="createPost()">
        ➕ Post
      </button>
    </div>
  </div>
</div>
