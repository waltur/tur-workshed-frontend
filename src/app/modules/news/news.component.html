<div class="max-w-2xl mx-auto mt-10">
  <h2 class="text-2xl font-bold mb-6 text-center text-orange-600">News Feed</h2>

  <div *ngFor="let post of posts" class="bg-white shadow-md rounded-lg p-5 mb-6">

    <!-- Título -->
    <h3 class="text-xl font-semibold text-gray-800">{{ post.title }}</h3>

    <!-- Descripción -->
    <p class="text-gray-600 mt-1 mb-3">{{ post.description }}</p>

    <!-- MEDIA (IMAGES + VIDEOS) -->
    <div *ngIf="post.images?.length" class="mt-3">
      <div class="grid gap-2"
           [ngClass]="{
             'grid-cols-1': post.images.length === 1,
             'grid-cols-2': post.images.length === 2,
             'grid-cols-2 grid-rows-2': post.images.length >= 3
           }">

        <ng-container *ngFor="let media of post.images.slice(0,4); let i = index">

          <div class="relative group">

            <!-- IMAGE -->
            <img *ngIf="isImage(media)"
                 [src]="media"
                 (click)="openGallery(post.images, i)"
                 class="w-full h-48 object-cover rounded cursor-pointer hover:opacity-90 transition duration-300"/>

            <!-- VIDEO -->
            <video *ngIf="isVideo(media)"
                   controls
                   class="w-full h-48 object-cover rounded">
              <source [src]="media" type="video/mp4">
            </video>

            <!-- Overlay +N -->
            <div *ngIf="i === 3 && post.images.length > 4"
                 class="absolute inset-0 bg-black bg-opacity-50 text-white flex items-center justify-center text-xl font-bold rounded">
              +{{ post.images.length - 4 }}
            </div>

          </div>

        </ng-container>

      </div>
    </div>

    <!-- Fecha -->
    <div class="text-sm text-gray-400 mb-2">
      <i class="bi bi-clock"></i> Posted on {{ post.created_at | date: 'short' }}
    </div>

    <!-- Reacciones -->
    <div class="flex items-center gap-3 mt-3">

      <button class="btn btn-sm"
              [disabled]="post.liked_by_me"
              (click)="likePost(post.id_post)"
              [ngClass]="{
                'btn-outline-warning': !post.liked_by_me,
                'btn-warning': post.liked_by_me
              }">
        👍 {{ post.likes }}
      </button>

      <div class="flex-grow relative">
        <input
          type="text"
          placeholder="Write a comment..."
          #commentInput
          (focus)="handleCommentFocus()"
          (keydown.enter)="isLoggedIn && addComment(post.id_post, commentInput.value); commentInput.value=''"
          [readonly]="!isLoggedIn"
          class="w-full border border-gray-300 rounded px-3 py-1 text-sm focus:outline-none focus:ring focus:border-pink-400"
        />
      </div>

      <button class="bg-orange-600 hover:bg-yellow-600 text-white px-3 py-1 text-sm rounded"
              (click)="addComment(post.id_post, commentInput.value); commentInput.value=''">
        <i class="bi bi-send-fill"></i>
      </button>

    </div>

    <div *ngIf="!isLoggedIn && commentAttempted" class="text-red-600 text-xs mt-1 pl-1">
      Please log in to comment.
    </div>

    <!-- Comentarios -->
    <ng-template #commentTemplate let-comments let-postId="postId">
      <div *ngFor="let c of comments" class="mt-3 text-sm text-gray-800 border-t border-gray-200 pt-3">

        <span class="font-semibold text-orange-600">{{ c.name }}</span>: {{ c.comment }}

        <button class="text-blue-600 text-xs ml-2"
                (click)="toggleReplyInput(postId, c.id_comment)">
          Reply
        </button>

        <!-- Input reply -->
        <div *ngIf="isReplying(postId, c.id_comment)" class="mt-1 flex gap-1">
          <input
            [(ngModel)]="replyTexts[c.id_comment]"
            placeholder="Write a reply..."
            [disabled]="!isLoggedIn"
            (focus)="handleCommentFocus()"
            class="flex-grow border rounded px-2 py-1 text-sm"
          />

          <button class="bg-orange-600 text-white px-2 py-1 rounded text-xs"
                  (click)="submitReply(postId, c.id_comment)">
            Send
          </button>
        </div>

        <div *ngIf="!isLoggedIn && commentAttempted"
             class="text-red-600 text-xs mt-1 pl-1">
          Please log in to comment.
        </div>

        <!-- Replies -->
        <div class="ml-6 border-l border-gray-300 pl-3">
          <ng-container
            *ngTemplateOutlet="commentTemplate; context: { $implicit: c.replies, postId: postId }">
          </ng-container>
        </div>

      </div>
    </ng-template>

    <ng-container
      *ngTemplateOutlet="commentTemplate;
      context: {
        $implicit: (expandedPosts.has(post.id_post) ? post.comments : post.comments.slice(-2)),
        postId: post.id_post
      }">
    </ng-container>

    <!-- Ver más -->
    <div *ngIf="post.comments.length > 2"
         class="mt-2 text-sm text-blue-600 cursor-pointer pl-1 hover:underline"
         (click)="toggleComments(post.id_post)">
      {{ expandedPosts.has(post.id_post) ? 'Hide comments' : 'View more comments' }}
    </div>

  </div>
</div>


<!-- MODAL GALERÍA (IMAGEN + VIDEO) -->
<div class="modal fade" id="galleryModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down modal-lg">
    <div class="modal-content bg-black border-0">

      <div class="modal-body p-0 position-relative d-flex justify-content-center align-items-center"
           style="min-height:80vh">

        <!-- IMAGE -->
        <img *ngIf="isImage(selectedGalleryImages[selectedImageIndex])"
             [src]="selectedGalleryImages[selectedImageIndex]"
             class="img-fluid rounded shadow-lg"
             style="max-height:80vh; object-fit:contain">

        <!-- VIDEO -->
        <video *ngIf="isVideo(selectedGalleryImages[selectedImageIndex])"
               controls
               class="img-fluid rounded shadow-lg"
               style="max-height:80vh">
          <source [src]="selectedGalleryImages[selectedImageIndex]" type="video/mp4">
        </video>

        <!-- CLOSE -->
        <button class="btn btn-light position-absolute top-0 end-0 m-3"
                data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </button>

        <!-- PREV -->
        <button class="btn btn-outline-light position-absolute start-0 top-50 translate-middle-y rounded-circle"
                (click)="prevImage()"
                [disabled]="selectedImageIndex === 0"
                style="width:40px;height:40px">
          <i class="bi bi-chevron-left"></i>
        </button>

        <!-- NEXT -->
        <button class="btn btn-outline-light position-absolute end-0 top-50 translate-middle-y rounded-circle"
                (click)="nextImage()"
                [disabled]="selectedImageIndex === selectedGalleryImages.length - 1"
                style="width:40px;height:40px">
          <i class="bi bi-chevron-right"></i>
        </button>

      </div>
    </div>
  </div>
</div>
